<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notes · Tom · Product Unleashed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#110b1a;
  --fg:#f4ecd9;
  --fg-soft:rgba(244,236,217,.6);
  --fg-faint:rgba(244,236,217,.35);
  --accent:#ee7d6b;
  --good:#a8e08c;
  --warn:#ffd54a;
  --serif:'Fraunces',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:var(--serif);font-optical-sizing:auto;min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding:clamp(16px,2.5vw,32px) clamp(20px,3vw,48px);display:flex;flex-direction:column;gap:clamp(14px,2vw,24px);min-height:100vh}

/* HEADER */
.head{display:flex;justify-content:space-between;align-items:baseline;gap:clamp(16px,2vw,32px);padding-bottom:clamp(10px,1.5vw,18px);border-bottom:1px solid rgba(244,236,217,.12);flex-wrap:wrap}
.head-left{display:flex;gap:clamp(10px,1.5vw,18px);align-items:baseline;flex-wrap:wrap}
.pill{display:inline-block;background:var(--accent);color:var(--bg);padding:6px 14px;border-radius:6px;font-family:var(--mono);font-size:clamp(11px,1.1vw,14px);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.pill.muted{background:rgba(244,236,217,.1);color:var(--fg-soft)}
.slide-title{font-family:var(--serif);font-size:clamp(20px,3vw,36px);font-weight:700;font-variation-settings:'opsz' 144,'SOFT' 60;letter-spacing:-.01em}
.head-right{display:flex;align-items:baseline;gap:clamp(10px,1.5vw,18px);font-family:var(--mono);font-size:clamp(11px,1.1vw,15px);color:var(--fg-soft);letter-spacing:2px;text-transform:uppercase;flex-wrap:wrap}
.timer{font-size:clamp(22px,2.6vw,32px);color:var(--fg);font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.timer.idle{color:var(--fg-faint)}
.timer.over{color:var(--accent)}
.timer.warn{color:var(--warn)}
.timer-label{opacity:.55}
.timer-budget{font-family:var(--mono);font-size:clamp(12px,1.2vw,16px);color:var(--fg-faint);letter-spacing:1px;margin-left:6px}
.timer-btn{background:var(--accent);color:var(--bg);border:0;font-family:var(--mono);font-size:clamp(11px,1.1vw,13px);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border-radius:6px;cursor:pointer;transition:background 200ms ease}
.timer-btn:hover{background:#f4907f}
.timer-btn.running{background:rgba(244,236,217,.12);color:var(--fg-soft)}
.timer-btn.running:hover{background:rgba(244,236,217,.18);color:var(--fg)}

/* CONNECTION */
.conn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-faint)}
.conn::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--fg-faint)}
.conn.live{color:var(--good)}
.conn.live::before{background:var(--good);box-shadow:0 0 8px var(--good)}

/* HEADLINE ECHO */
.echo{font-family:var(--serif);font-size:clamp(28px,4.2vw,52px);font-weight:700;font-variation-settings:'opsz' 144,'SOFT' 60;line-height:1.05;letter-spacing:-.02em;color:var(--fg)}
.echo .accent{color:var(--accent);font-style:italic}

/* MAIN NOTES */
.body-wrap{flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:clamp(20px,2.5vw,36px);min-height:0}
.col{display:flex;flex-direction:column;gap:clamp(12px,1.4vw,18px);min-width:0;min-height:0;overflow:hidden}
.col-title{font-family:var(--mono);font-size:clamp(11px,1.1vw,13px);letter-spacing:3px;text-transform:uppercase;color:var(--fg-soft);font-weight:700}
.beats{display:flex;flex-direction:column;gap:clamp(10px,1.2vw,14px);overflow-y:auto;padding-right:8px}
.beat{font-family:var(--serif);font-size:clamp(16px,1.8vw,24px);line-height:1.4;padding-left:24px;position:relative}
.beat::before{content:'';position:absolute;left:0;top:.6em;width:10px;height:2px;background:var(--accent)}
.beat strong{color:var(--accent);font-weight:700}
.beat em{font-style:italic;color:var(--fg-soft)}

.aside{background:rgba(238,125,107,.08);border-left:3px solid var(--accent);padding:clamp(14px,1.5vw,18px) clamp(16px,1.8vw,22px);font-family:var(--serif);font-style:italic;font-size:clamp(15px,1.7vw,22px);line-height:1.45;color:var(--fg);font-variation-settings:'SOFT' 80}
.aside-label{display:block;font-family:var(--mono);font-style:normal;font-size:clamp(10px,.9vw,11px);letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}

.fragment-meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:clamp(11px,1vw,13px);color:var(--fg-soft);letter-spacing:2px;text-transform:uppercase}
.frag-dots{display:flex;gap:6px}
.frag-dot{width:clamp(10px,1vw,14px);height:clamp(10px,1vw,14px);border-radius:50%;background:rgba(244,236,217,.15);transition:background 200ms ease}
.frag-dot.shown{background:var(--accent)}

/* NEXT-UP */
.next-card{background:rgba(244,236,217,.04);border:1px solid rgba(244,236,217,.1);border-radius:10px;padding:clamp(14px,1.5vw,18px) clamp(16px,1.8vw,22px);display:flex;flex-direction:column;gap:8px}
.next-label{font-family:var(--mono);font-size:clamp(10px,.9vw,11px);letter-spacing:3px;text-transform:uppercase;color:var(--fg-faint);font-weight:700}
.next-title{font-family:var(--serif);font-size:clamp(18px,2vw,24px);font-weight:700;color:var(--fg)}
.next-hint{font-family:var(--serif);font-style:italic;font-size:clamp(14px,1.4vw,17px);line-height:1.4;color:var(--fg-soft)}

/* FOOTER */
.foot{display:flex;justify-content:space-between;align-items:baseline;padding-top:14px;border-top:1px solid rgba(244,236,217,.1);font-family:var(--mono);font-size:clamp(10px,1vw,12px);letter-spacing:2px;text-transform:uppercase;color:var(--fg-faint);gap:14px;flex-wrap:wrap}
.foot a{color:var(--accent);text-decoration:none}

/* Below ~900px the two-column body-wrap stacks vertically */
@media (max-width:900px){
  .body-wrap{grid-template-columns:1fr}
}
</style>
</head>

</div>

  <span>Open the deck in another tab on this domain. <a href="./" target="_blank">deck →</a></span>
</div>

// Total spoken-talk budget. 10:30 = 630s. 13:00 slot includes Q&A.
const TALK_BUDGET_S = 630;

let curSlide = 1, curFrag = 0, totalReveals = {};
let timerStart = null, timerHandle = null;

const $ = id => document.getElementById(id);

function fmt(ms){var s=Math.floor(ms/1000);var m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0')}

function renderTimer(){
  var el = $('timer');
  var btn = $('timer-btn');
  if(!timerStart){
    el.innerHTML = '0:00<span class="timer-budget">/ 10:30</span>';
    el.className = 'timer idle';
    btn.textContent = 'Start';
    btn.classList.remove('running');
    return;
  }
  var elapsed = Date.now() - timerStart;
  var budget = TALK_BUDGET_S * 1000;
  el.innerHTML = fmt(elapsed) + '<span class="timer-budget">/ 10:30</span>';
  el.classList.remove('idle','over','warn');
  if(elapsed > budget) el.classList.add('over');
  else if(elapsed > budget*0.8) el.classList.add('warn');
  btn.textContent = 'Reset';
  btn.classList.add('running');
}

function toggleTimer(){
  if(timerStart){
    if(!confirm('Reset the timer back to 0:00?')) return;
    timerStart = null;
  } else {
    timerStart = Date.now();
  }
  renderTimer();
}

function renderBeats(list, into){
  into.innerHTML = '';
  if(!list || !list.length){into.innerHTML = '<div style="color:var(--fg-faint);font-style:italic;font-size:18px">No notes.</div>';return}
  list.forEach(function(t){
    var d = document.createElement('div');
    d.className = 'beat';
    d.innerHTML = t;
    into.appendChild(d);
  });
}

function renderAsides(list, into){
  into.innerHTML = '';
  if(!list || !list.length){into.innerHTML = '<div style="color:var(--fg-faint);font-style:italic;font-size:18px">No asides for this slide.</div>';return}
  list.forEach(function(a){
    var d = document.createElement('div');
    d.className = 'aside';
    d.innerHTML = '<span class="aside-label">'+a.label+'</span>'+a.text;
    into.appendChild(d);
  });
}

function renderFragDots(total, current){
  var into = $('frag-dots'); into.innerHTML='';
  for(var i=1;i<=total;i++){
    var dot=document.createElement('span');
    dot.className='frag-dot'+(i<=current?' shown':'');
    into.appendChild(dot);
  }
  $('frag-text').textContent = 'reveal '+current+' / '+total;
}

function renderNext(nextObj){
  var card = $('next-card');
  if(!nextObj){card.innerHTML = '<span class="next-label">End of deck</span><div class="next-title">Drop the mic.</div>';return}
  card.innerHTML = '<span class="next-label">Next</span><div class="next-title">'+nextObj.title+'</div><div class="next-hint">'+nextObj.hint+'</div>';
}

function render(slideIdx, fragIdx, totalRevealsOnSlide){
  var n = NOTES[slideIdx] || NOTES[1];
  $('slide-num').textContent = String(slideIdx).padStart(2,'0')+' / 23';
  $('slide-title').textContent = n.title;
  $('slide-budget').textContent = n.budget;
  $('echo').innerHTML = n.echo;
  renderBeats(n.beats, $('beats'));
  renderAsides(n.asides, $('asides'));
  renderNext(n.next);
  renderFragDots(totalRevealsOnSlide || 0, fragIdx);
}

function setSlide(slideIdx, fragIdx, total){
  curSlide = slideIdx;
  curFrag = fragIdx;
  totalReveals[slideIdx] = total || totalReveals[slideIdx] || 0;
  render(slideIdx, fragIdx, totalReveals[slideIdx]);
}

// BroadcastChannel — listen for deck state
var bc = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('deck-sync') : null;
if(bc){
  bc.onmessage = function(e){
    if(!e.data || typeof e.data.slideIdx !== 'number') return;
    $('conn').textContent = 'live';
    $('conn').classList.add('live');
    // deck broadcasts 0-indexed slideIdx, plus the slide's total reveal count
    setSlide(e.data.slideIdx + 1, e.data.fragIdx, e.data.fragTotal);
  };
  // Ask deck for current state in case we connected late
  bc.postMessage({req:'state'});
}

// Timer tick + button
timerHandle = setInterval(renderTimer, 250);
$('timer-btn').addEventListener('click', toggleTimer);

// Initial render
render(1, 0, 1);
renderTimer();
</script>
</body>
</html>
