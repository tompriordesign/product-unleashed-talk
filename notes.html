<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notes · Tom · Product Unleashed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#110b1a;
  --fg:#f4ecd9;
  --fg-soft:rgba(244,236,217,.6);
  --fg-faint:rgba(244,236,217,.35);
  --accent:#ee7d6b;
  --good:#a8e08c;
  --warn:#ffd54a;
  --serif:'Fraunces',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:var(--serif);font-optical-sizing:auto;min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding:clamp(16px,2.5vw,32px) clamp(20px,3vw,48px);display:flex;flex-direction:column;gap:clamp(14px,2vw,24px);min-height:100vh}

/* HEADER */
.head{display:flex;justify-content:space-between;align-items:baseline;gap:clamp(16px,2vw,32px);padding-bottom:clamp(10px,1.5vw,18px);border-bottom:1px solid rgba(244,236,217,.12);flex-wrap:wrap}
.head-left{display:flex;gap:clamp(10px,1.5vw,18px);align-items:baseline;flex-wrap:wrap}
.pill{display:inline-block;background:var(--accent);color:var(--bg);padding:6px 14px;border-radius:6px;font-family:var(--mono);font-size:clamp(11px,1.1vw,14px);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.pill.muted{background:rgba(244,236,217,.1);color:var(--fg-soft)}
.slide-title{font-family:var(--serif);font-size:clamp(20px,3vw,36px);font-weight:700;font-variation-settings:'opsz' 144,'SOFT' 60;letter-spacing:-.01em}
.head-right{display:flex;align-items:baseline;gap:clamp(10px,1.5vw,18px);font-family:var(--mono);font-size:clamp(11px,1.1vw,15px);color:var(--fg-soft);letter-spacing:2px;text-transform:uppercase;flex-wrap:wrap}
.timer{font-size:clamp(22px,2.6vw,32px);color:var(--fg);font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.timer.idle{color:var(--fg-faint)}
.timer.over{color:var(--accent)}
.timer.warn{color:var(--warn)}
.timer-label{opacity:.55}
.timer-budget{font-family:var(--mono);font-size:clamp(12px,1.2vw,16px);color:var(--fg-faint);letter-spacing:1px;margin-left:6px}
.timer-btn{background:var(--accent);color:var(--bg);border:0;font-family:var(--mono);font-size:clamp(11px,1.1vw,13px);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border-radius:6px;cursor:pointer;transition:background 200ms ease}
.timer-btn:hover{background:#f4907f}
.timer-btn.running{background:rgba(244,236,217,.12);color:var(--fg-soft)}
.timer-btn.running:hover{background:rgba(244,236,217,.18);color:var(--fg)}

/* CONNECTION */
.conn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-faint)}
.conn::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--fg-faint)}
.conn.live{color:var(--good)}
.conn.live::before{background:var(--good);box-shadow:0 0 8px var(--good)}

/* HEADLINE ECHO */
.echo{font-family:var(--serif);font-size:clamp(28px,4.2vw,52px);font-weight:700;font-variation-settings:'opsz' 144,'SOFT' 60;line-height:1.05;letter-spacing:-.02em;color:var(--fg)}
.echo .accent{color:var(--accent);font-style:italic}

/* MAIN NOTES */
.body-wrap{flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:clamp(20px,2.5vw,36px);min-height:0}
.col{display:flex;flex-direction:column;gap:clamp(12px,1.4vw,18px);min-width:0;min-height:0;overflow:hidden}
.col-title{font-family:var(--mono);font-size:clamp(11px,1.1vw,13px);letter-spacing:3px;text-transform:uppercase;color:var(--fg-soft);font-weight:700}
.beats{display:flex;flex-direction:column;gap:clamp(10px,1.2vw,14px);overflow-y:auto;padding-right:8px}
.beat{font-family:var(--serif);font-size:clamp(16px,1.8vw,24px);line-height:1.4;padding-left:24px;position:relative}
.beat::before{content:'';position:absolute;left:0;top:.6em;width:10px;height:2px;background:var(--accent)}
.beat strong{color:var(--accent);font-weight:700}
.beat em{font-style:italic;color:var(--fg-soft)}

.aside{background:rgba(238,125,107,.08);border-left:3px solid var(--accent);padding:clamp(14px,1.5vw,18px) clamp(16px,1.8vw,22px);font-family:var(--serif);font-style:italic;font-size:clamp(15px,1.7vw,22px);line-height:1.45;color:var(--fg);font-variation-settings:'SOFT' 80}
.aside-label{display:block;font-family:var(--mono);font-style:normal;font-size:clamp(10px,.9vw,11px);letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}

.fragment-meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:clamp(11px,1vw,13px);color:var(--fg-soft);letter-spacing:2px;text-transform:uppercase}
.frag-dots{display:flex;gap:6px}
.frag-dot{width:clamp(10px,1vw,14px);height:clamp(10px,1vw,14px);border-radius:50%;background:rgba(244,236,217,.15);transition:background 200ms ease}
.frag-dot.shown{background:var(--accent)}

/* NEXT-UP */
.next-card{background:rgba(244,236,217,.04);border:1px solid rgba(244,236,217,.1);border-radius:10px;padding:clamp(14px,1.5vw,18px) clamp(16px,1.8vw,22px);display:flex;flex-direction:column;gap:8px}
.next-label{font-family:var(--mono);font-size:clamp(10px,.9vw,11px);letter-spacing:3px;text-transform:uppercase;color:var(--fg-faint);font-weight:700}
.next-title{font-family:var(--serif);font-size:clamp(18px,2vw,24px);font-weight:700;color:var(--fg)}
.next-hint{font-family:var(--serif);font-style:italic;font-size:clamp(14px,1.4vw,17px);line-height:1.4;color:var(--fg-soft)}

/* FOOTER */
.foot{display:flex;justify-content:space-between;align-items:baseline;padding-top:14px;border-top:1px solid rgba(244,236,217,.1);font-family:var(--mono);font-size:clamp(10px,1vw,12px);letter-spacing:2px;text-transform:uppercase;color:var(--fg-faint);gap:14px;flex-wrap:wrap}
.foot a{color:var(--accent);text-decoration:none}

/* Below ~900px the two-column body-wrap stacks vertically */
@media (max-width:900px){
  .body-wrap{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="head">
  <div class="head-left">
    <span class="pill" id="slide-num">01 / 15</span>
    <span class="slide-title" id="slide-title">Hook</span>
    <span class="pill muted" id="slide-budget">~30s</span>
  </div>
  <div class="head-right">
    <span class="conn" id="conn">awaiting deck</span>
    <button class="timer-btn" id="timer-btn" type="button">Start</button>
    <span class="timer idle" id="timer">0:00<span class="timer-budget">/ 10:30</span></span>
  </div>
</div>

<div class="echo" id="echo">Speaker view loaded.</div>

<div class="body-wrap">
  <div class="col">
    <div class="col-title">Beats</div>
    <div class="beats" id="beats"></div>
    <div class="fragment-meta">
      <span id="frag-text">reveal 0 / 0</span>
      <span class="frag-dots" id="frag-dots"></span>
    </div>
  </div>
  <div class="col">
    <div class="col-title">Verbal asides</div>
    <div class="beats" id="asides"></div>
    <div class="col-title" style="margin-top:8px">Up next</div>
    <div class="next-card" id="next-card"></div>
  </div>
</div>

<div class="foot">
  <span>Notes view · syncs via BroadcastChannel <span style="color:var(--fg-soft)">deck-sync</span></span>
  <span>Open the deck in another tab on this domain. <a href="./" target="_blank">deck →</a></span>
</div>

<script>
const NOTES = {
  1:{title:"Hook",budget:"~30s",echo:'How many of you have an app idea you <span class="accent">haven\'t built yet?</span>',
     beats:["Stand still. Make eye contact with the back row.","Pause <strong>after</strong> the question. Let it sit two beats.","Optional callback: <em>'Six months ago, I had one too.'</em>"],
     asides:[],
     next:{title:"What I built",hint:"Migrapulse logo + phone video on dark."}},
  2:{title:"What I built",budget:"~90s",echo:'<span class="accent">Migrapulse.</span>',
     beats:["Logo + phone video are the slide. No text, no reveals — just talk over it.","Open with the name: <em>This is Migrapulse.</em>","Walk the facts verbally while the demo plays: voice-first migraine tracker · on-device AI · triggered by the action button or Siri · no sign up · nothing leaves your phone · built solo in Cursor + Claude · two months end to end."],
     asides:[{label:"Optional aside",text:"I haven't done any marketing for this yet. There's a free tier and a paid tier. People are paying. I haven't pushed any of it."}],
     next:{title:"The objection",hint:"\"Why not just Lovable it?\" Casino GIF answers it."}},
  3:{title:"The obvious objection",budget:"~30s",echo:'<span class="accent">Lovable</span> · Me',
     beats:["Meme carries the joke. No clicks on this slide, no headline, no list.","Say the question aloud: <em>\"Why didn't you just Lovable it in two hours?\"</em>","Then the two clarifications: <strong>(1)</strong> I didn't learn to code, the tool changed. <strong>(2)</strong> Lovable is shorthand for the whole category."],
     asides:[],
     next:{title:"What's your moat?",hint:"The setup for the iOS argument."}},
  4:{title:"What's your moat?",budget:"~75s",echo:'What\'s your <span class="accent">moat?</span>',
     beats:["<strong>Frame:</strong> <em>'The question nobody asks.'</em>","Ask it: <em>'What's your moat?'</em>","Tease the default — gesture at the faded <em>'Product.'</em> under the headline. <em>'Most founders say product. Product is table stakes — it's not a moat.'</em>","Reframe with the right column. Read it as one sentence: <em>Distribution. Credibility. Privacy and security.</em>","<strong>Land the punch line:</strong> <em>'Copy a vibe-coded SaaS and you have none of them.'</em>","Pause. Let it sit."],
     asides:[{label:"Define moat",text:"A moat is the thing that stops the next person copying you in a day. In an age where everyone can vibe-code a working clone of a SaaS in an afternoon, the question 'what's your moat' has never mattered more."},{label:"The hot take",text:"Moats are critical in product design. Whole other talk in itself. The short version for tonight: product alone isn't a moat — it's table stakes."},{label:"Other moats to name-check (optional)",text:"Network effects. Cost. Brand. Switching cost. Regulatory."}],
     next:{title:"iOS hands you both",hint:"Defensive vs offensive moats — the two-column answer."}},
  5:{title:"iOS hands you both",budget:"~60s",echo:'iOS hands you <span class="accent">both.</span>',
     beats:["<strong>Two columns on screen.</strong> Defensive on the left, offensive on the right.","Frame: <em>'iOS hands you both kinds of moat out of the box.'</em>","<strong>Defensive — what iOS handles for you:</strong> Security. Payments. Identity. Privacy. Sign in with Apple replaces a whole auth team.","<strong>Offensive — what iOS lets you reach:</strong> Sensors. Health. Camera &amp; mic. Action button &amp; watch. On-device AI. <em>And — creative freedom.</em>","<strong>Land creative freedom:</strong> 'The whole package is downloaded. Native widgets to riff on. Weird gets praised on iOS — flagged on the web. More room to be playful.'","Note: <em>'It's harder, but it's yours.'</em>"],
     asides:[{label:"Why the split matters",text:"Defensive moats keep the things you ship safe and trusted. Offensive moats let you ship things that aren't possible elsewhere. iOS is the rare platform that hands you both."},{label:"On creative freedom",text:"I've been pro-web for years. I still hope the AI-era craft happens there. But right now — the most interesting craft is shipping native. You have more license, because the whole package is downloaded."}],
     next:{title:"Planning to monetise?",hint:"The imperative. Don't build until you've planned distribution."}},
  6:{title:"Planning to monetise?",budget:"~45s",echo:'Planning to monetise? <span class="accent">Don\'t build</span> until you\'ve <span class="accent">planned distribution.</span>',
     beats:["<strong>One line on screen.</strong> Read it slowly.","No clicks. Hold the silence. Let it sting.","\"Distribution is the final boss\" — save that line for the Yhorm slide that follows."],
     asides:[{label:"Why this matters now",text:"Web is at the mercy of paid acquisition, SEO, and luck. The vibe-coded clone game has made all three harder. If monetisation matters, the question \"how will anyone find this?\" has to be answered before the first line of code."}],
     next:{title:"Distribution (Yhorm)",hint:"Visual stinger. This is where 'final boss' lands."}},
  7:{title:"Distribution",budget:"~30s",echo:'<span class="accent">Distribution.</span>',
     beats:["Yhorm is the whole slide. No headline. No text.","<strong>This is where the line lands:</strong> <em>'Distribution is the final boss of product.'</em>","Hold the silence for a beat before advancing."],
     asides:[],
     next:{title:"A head start",hint:"Four iOS distribution advantages."}},
  8:{title:"A head start",budget:"~75s",echo:'A <span class="accent">head start.</span>',
     beats:["Frame: <strong>iOS gives you a head start on distribution.</strong> Well-established. Good guardrails.","All four advantages are on screen. Walk them top to bottom — one beat each.","01 Storefront in 30 minutes — title, subtitle, screenshots. That's the store.","02 A known playbook — ASO + search. 20 years of best practice you can copy.","03 Apple helps you — Featured, social, paid acquisition all built in.","04 Good guardrails — review keeps the bar high; your competitors have to clear it too."],
     asides:[{label:"Why this matters",text:"On the web, every founder has to invent distribution from scratch. On iOS, the pond is already stocked. You're not building the distribution — you're plugging into one that's been compounding for nearly 20 years."}],
     next:{title:"Security",hint:"Three icon cards: database, auth, schema."}},
  9:{title:"Security",budget:"~90s",echo:'<span class="accent">Security.</span>',
     beats:["Open with the horror story aside.","Three cards are already on screen — walk them top to bottom, one beat each.","Database open — default-public, AI ships it.","Auth bypassed — a teenager finds the broken check.","One bad migration — wipes data, no undo."],
     asides:[{label:"Opening line for this slide",text:"Last month a vibe-coded SaaS leaked every customer's data because the database was open to the internet. The week before, another one had its auth bypassed by a teenager. These aren't AI's fault. They're the failure modes of moving fast on the web."}],
     next:{title:"Device",hint:"Two phones. Lovable signup vs Migrapulse home."}},
  10:{title:"Device",budget:"~90s",echo:'<span class="accent">Device.</span>',
      beats:["Two phones on screen. Left fades — browser tab, email, password.","Right is the action button + voice. Three seconds beats three minutes.","<strong>Introduce \"iOS-shaped idea\" here.</strong> This is where the phrase enters the talk."],
      asides:[{label:"Define iOS-shaped idea",text:"Anything that touches the body or the moment. The camera. The mic. The watch. Your health. The action you take in the seconds before you forget."}],
      next:{title:"Creativity",hint:"Web verbs vs iOS verbs."}},
  11:{title:"Creativity",budget:"~75s",echo:'<span class="accent">Creativity.</span>',
      beats:["Two verb columns on screen. Left: 4 web verbs. Right: 20+ iOS verbs.","Let the accumulation do the work. <em>The cascade IS the argument.</em>","Read 3 or 4 iOS verbs aloud at the end for emphasis."],
      asides:[],
      next:{title:"The catch",hint:"Effort is the moat. Four reveals."}},
  12:{title:"The catch · Effort is the moat",budget:"~100s",echo:'Effort is <span class="accent">the moat now.</span>',
      beats:["<strong>Dense slide. Give each reveal its own breath.</strong>","R1 — Requirements list. Walk through: $20, $99, Free, week, rejection.","R2 — Rejection timeline. Walk the four dates. Acknowledge the wait.","R3 — Inflatable furniture. <strong>Deliver slowly.</strong>","R4 — Moat-line. Land it and stop talking for a beat."],
      asides:[{label:"R3 delivery cadence",text:"A vibe-coded app is inflatable furniture. [pause] Real humans at Apple sit on it. They can tell. The bar is rising. Make your first submission count."}],
      next:{title:"Apple is the bouncer",hint:"Three cards: weeks · first miss · bar rising."}},
  13:{title:"Apple is the bouncer",budget:"~75s",echo:'Apple is the <span class="accent">bouncer.</span>',
      beats:["<strong>This slide motivates why structure matters.</strong>","Walk the three cards top to bottom.","Weeks, not minutes — first review is 1–4 weeks. Then weeks more for re-reviews.","First miss → rejected — Apple finds the FIRST thing wrong and stops. You don't get a punch list.","The bar is rising — Apple is inundated. Polish + originality break through. Screenshots matter.","Close with the strip: <em>'Structure is how you clear it.'</em>"],
      asides:[{label:"The Migrapulse rejection story",text:"My first review came back in about three days. Rejected inside thirty minutes. Apple don't audit your whole app — they find one thing and stop. Then I waited another week. That's the cadence. Every iteration is a week. So you ship quality first time, or you bleed weeks."},{label:"Why Swift matters here",text:"Apple is reviewing code now too — not just the binary. The closer you are to the platform language, the less surface area for things to go wrong."}],
      next:{title:"The how, briefly",hint:"Vibes in. Structure out. Equation cards."}},
  14:{title:"The how, briefly",budget:"~60s",echo:'Vibes in. <span class="accent">Structure out.</span>',
      beats:["Click: forcing pair reveals. Swift forces it. RN abstracts.","Click: equation cards reveal. Walk left-to-right, one phrase per card.","Click: how-callout. <strong>Plug the masterclass.</strong> QR is next slide."],
      asides:[],
      next:{title:"Close",hint:"iOS-shaped idea callback + QR."}},
  15:{title:"Close",budget:"~60s",echo:'If you\'ve got an<br><span class="accent">iOS-shaped idea</span><br>sitting in your head,<br>the tools are finally there.',
      beats:["<strong>Open with the migraine callback.</strong>","Read the headline slowly.","Click: QR appears. Stand still. Drop the mic."],
      asides:[{label:"The callback opener",text:"Six months ago I had a migraine and I couldn't open my journal app fast enough. I built an app. I shipped it. Two months. One person. No team. No funding."}],
      next:null}
};

// Total spoken-talk budget. 10:30 = 630s. 13:00 slot includes Q&A.
const TALK_BUDGET_S = 630;

let curSlide = 1, curFrag = 0, totalReveals = {};
let timerStart = null, timerHandle = null;

const $ = id => document.getElementById(id);

function fmt(ms){var s=Math.floor(ms/1000);var m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0')}

function renderTimer(){
  var el = $('timer');
  var btn = $('timer-btn');
  if(!timerStart){
    el.innerHTML = '0:00<span class="timer-budget">/ 10:30</span>';
    el.className = 'timer idle';
    btn.textContent = 'Start';
    btn.classList.remove('running');
    return;
  }
  var elapsed = Date.now() - timerStart;
  var budget = TALK_BUDGET_S * 1000;
  el.innerHTML = fmt(elapsed) + '<span class="timer-budget">/ 10:30</span>';
  el.classList.remove('idle','over','warn');
  if(elapsed > budget) el.classList.add('over');
  else if(elapsed > budget*0.8) el.classList.add('warn');
  btn.textContent = 'Reset';
  btn.classList.add('running');
}

function toggleTimer(){
  if(timerStart){
    if(!confirm('Reset the timer back to 0:00?')) return;
    timerStart = null;
  } else {
    timerStart = Date.now();
  }
  renderTimer();
}

function renderBeats(list, into){
  into.innerHTML = '';
  if(!list || !list.length){into.innerHTML = '<div style="color:var(--fg-faint);font-style:italic;font-size:18px">No notes.</div>';return}
  list.forEach(function(t){
    var d = document.createElement('div');
    d.className = 'beat';
    d.innerHTML = t;
    into.appendChild(d);
  });
}

function renderAsides(list, into){
  into.innerHTML = '';
  if(!list || !list.length){into.innerHTML = '<div style="color:var(--fg-faint);font-style:italic;font-size:18px">No asides for this slide.</div>';return}
  list.forEach(function(a){
    var d = document.createElement('div');
    d.className = 'aside';
    d.innerHTML = '<span class="aside-label">'+a.label+'</span>'+a.text;
    into.appendChild(d);
  });
}

function renderFragDots(total, current){
  var into = $('frag-dots'); into.innerHTML='';
  for(var i=1;i<=total;i++){
    var dot=document.createElement('span');
    dot.className='frag-dot'+(i<=current?' shown':'');
    into.appendChild(dot);
  }
  $('frag-text').textContent = 'reveal '+current+' / '+total;
}

function renderNext(nextObj){
  var card = $('next-card');
  if(!nextObj){card.innerHTML = '<span class="next-label">End of deck</span><div class="next-title">Drop the mic.</div>';return}
  card.innerHTML = '<span class="next-label">Next</span><div class="next-title">'+nextObj.title+'</div><div class="next-hint">'+nextObj.hint+'</div>';
}

function render(slideIdx, fragIdx, totalRevealsOnSlide){
  var n = NOTES[slideIdx] || NOTES[1];
  $('slide-num').textContent = String(slideIdx).padStart(2,'0')+' / 15';
  $('slide-title').textContent = n.title;
  $('slide-budget').textContent = n.budget;
  $('echo').innerHTML = n.echo;
  renderBeats(n.beats, $('beats'));
  renderAsides(n.asides, $('asides'));
  renderNext(n.next);
  renderFragDots(totalRevealsOnSlide || 0, fragIdx);
}

function setSlide(slideIdx, fragIdx, total){
  curSlide = slideIdx;
  curFrag = fragIdx;
  totalReveals[slideIdx] = total || totalReveals[slideIdx] || 0;
  render(slideIdx, fragIdx, totalReveals[slideIdx]);
}

// BroadcastChannel — listen for deck state
var bc = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('deck-sync') : null;
if(bc){
  bc.onmessage = function(e){
    if(!e.data || typeof e.data.slideIdx !== 'number') return;
    $('conn').textContent = 'live';
    $('conn').classList.add('live');
    // deck broadcasts 0-indexed slideIdx, plus the slide's total reveal count
    setSlide(e.data.slideIdx + 1, e.data.fragIdx, e.data.fragTotal);
  };
  // Ask deck for current state in case we connected late
  bc.postMessage({req:'state'});
}

// Timer tick + button
timerHandle = setInterval(renderTimer, 250);
$('timer-btn').addEventListener('click', toggleTimer);

// Initial render
render(1, 0, 1);
renderTimer();
</script>
</body>
</html>
